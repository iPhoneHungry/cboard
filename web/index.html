<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>cboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#667eea;--bg:#eef0f7;--text:#2d3748;--muted:#718096;--border:#e2e8f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;flex-wrap:wrap;}
.wordmark{font-weight:800;color:var(--primary);font-size:16px;flex:1;}
.hactions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-family:inherit;font-weight:700;font-size:13px;border:none;border-radius:18px;padding:6px 13px;cursor:pointer;}
.btn-p{background:var(--primary);color:#fff;}
.btn-g{background:transparent;color:var(--muted);border:2px solid var(--border);}
.board{display:flex;gap:12px;padding:14px;overflow-x:auto;align-items:flex-start;}
.lane{background:#fff;border-radius:10px;min-width:250px;max-width:250px;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
.lane-h{padding:9px 12px;border-bottom:3px solid var(--lc,#667eea);display:flex;gap:8px;align-items:center;}
.lane-n{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.6px;flex:1;color:var(--lc,#333);}
.lane-c{background:var(--lc,#999);color:#fff;border-radius:10px;font-size:11px;font-weight:800;padding:1px 7px;}
.lane-b{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:30px;border-radius:8px;}
.lane-b.dragover{background:#eef0ff;outline:2px dashed var(--primary);outline-offset:-4px;}
.card{background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 11px;cursor:grab;-webkit-user-select:none;user-select:none;}
.card:active{border-color:var(--primary);cursor:grabbing;}
.card.dragging{opacity:.45;}
.card.epic{border-left:4px solid #b794f4;}
.card.paused{opacity:.6;}
.c-title{font-weight:700;font-size:13.5px;line-height:1.3;}
.c-foot{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--bg);color:var(--muted);}
.tag-epic{background:#faf5ff;color:#805ad5;}.tag-art{background:#f0fff4;color:#2f855a;}
.tag-repo{background:#ebf8ff;color:#2b6cb0;}.tag-pause{background:#fffaf0;color:#c05621;}
.tag-proj{background:#eef2ff;color:#4f46e5;}
.pbar{height:6px;background:var(--bg);border-radius:4px;margin-top:7px;overflow:hidden;}
.pfill{height:100%;background:#22c55e;}
.ptext{font-size:10px;color:var(--muted);font-weight:700;margin-top:3px;}
.st{font-size:10px;font-weight:800;padding:2px 8px;border-radius:9px;text-transform:uppercase;}
.st-todo{background:#e2e8f0;color:#4a5568;}.st-done{background:#c6f6d5;color:#276749;}
.st-blocked{background:#fed7d7;color:#c53030;}.st-needs_review{background:#feebc8;color:#b7791f;}
.overlay{position:fixed;inset:0;background:rgba(15,15,30,.55);z-index:50;overflow-y:auto;padding:20px 12px 40px;}
.overlay.hidden{display:none;}
.sheet{background:#fff;border-radius:12px;max-width:680px;margin:0 auto;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.sheet-h{display:flex;gap:10px;align-items:flex-start;padding:16px 18px;border-bottom:1px solid var(--border);}
.sheet-t{flex:1;font-weight:800;font-size:18px;}
.x{border:none;background:var(--bg);border-radius:50%;width:30px;height:30px;font-size:17px;cursor:pointer;color:var(--muted);}
.sheet-b{padding:16px 18px 22px;}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:800;margin:16px 0 9px;}
.md{font-size:14px;line-height:1.6;}
.md h1,.md h2,.md h3{margin:14px 0 7px;}.md p{margin-bottom:9px;}.md ul,.md ol{margin:6px 0 9px 20px;}
.md code{background:var(--bg);padding:1px 5px;border-radius:4px;border:1px solid var(--border);font-size:12.5px;}
.md pre{background:#1a1d23;color:#abb2bf;padding:12px;border-radius:8px;overflow-x:auto;}
.md img{max-width:100%;border-radius:8px;}
.iframe{width:100%;height:300px;border:1px solid var(--border);border-radius:8px;background:#fff;}
.arow{display:flex;gap:9px;align-items:center;background:var(--bg);border-radius:7px;padding:8px 11px;font-size:12.5px;font-weight:700;margin-top:6px;}
.arow span{flex:1;word-break:break-all;}
.arow a{color:var(--primary);font-weight:800;text-decoration:none;}
.trow{display:flex;gap:9px;align-items:center;background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:6px;cursor:pointer;}
.trow .tt{flex:1;font-weight:700;font-size:13.5px;}
.movebar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.msel{width:100%;font-family:inherit;font-weight:700;font-size:14px;padding:9px 12px;border:2px solid var(--border);border-radius:18px;background:#fff;color:var(--text);}
.logbox{background:#1a1d23;color:#abb2bf;padding:11px 13px;border-radius:8px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:220px;overflow-y:auto;}
.empty{color:var(--muted);font-style:italic;font-size:13px;}
textarea{width:100%;min-height:220px;font-family:monospace;font-size:13px;padding:11px;border:2px solid var(--primary);border-radius:8px;resize:vertical;}
/* Themed prompt modal (replaces native prompt()) */
.promptov{position:fixed;inset:0;background:rgba(15,15,30,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;}
.promptov.hidden{display:none;}
.promptbox{background:#fff;border-radius:14px;width:100%;max-width:420px;box-shadow:0 20px 50px rgba(0,0,0,.35);overflow:hidden;animation:popin .14s ease;}
@keyframes popin{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.promptbox-h{font-weight:800;font-size:16px;padding:16px 18px 0;color:var(--text);}
.promptbox-b{padding:12px 18px 0;}
.promptbox input{width:100%;font-family:inherit;font-size:15px;padding:11px 13px;border:2px solid var(--border);border-radius:10px;color:var(--text);outline:none;}
.promptbox input:focus{border-color:var(--primary);}
.promptbox-f{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px 16px;}
.btn-danger{background:#fff;color:#e53e3e;border:2px solid #f3c4c4;}
/* Attachment file list with thumbnails + preview */
.filelist{display:flex;flex-direction:column;gap:6px;max-height:264px;overflow-y:auto;margin-top:6px;padding-right:2px;}
.fileitem{display:flex;align-items:center;gap:10px;padding:7px 9px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;}
.fileitem:hover{border-color:var(--primary);}
.fileitem .thumb{width:42px;height:42px;border-radius:6px;flex:0 0 auto;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.fileitem .thumb img{width:100%;height:100%;object-fit:cover;}
.fileitem .fmeta{flex:1;min-width:0;}
.fileitem .fname{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fileitem .fsub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.fileitem .fopen{color:var(--primary);font-weight:800;font-size:12px;flex:0 0 auto;}
/* Full-screen preview lightbox */
.previewov{position:fixed;inset:0;background:rgba(8,8,16,.84);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;}
.previewov.hidden{display:none;}
.previewov img{max-width:94vw;max-height:80vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
.previewov iframe{width:min(960px,94vw);height:80vh;background:#fff;border:none;border-radius:8px;}
.previewbar{display:flex;gap:12px;align-items:center;margin-bottom:12px;color:#fff;font-weight:700;font-size:14px;max-width:94vw;}
.previewbar a{color:#9ecbff;font-weight:800;text-decoration:none;}
.previewbar .pclose{margin-left:auto;cursor:pointer;background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:18px;font-weight:800;}
/* Review rounds + feedback */
.rounds{display:flex;flex-direction:column;gap:8px;margin:6px 0;}
.round{border:1px solid var(--border);border-left:3px solid #a855f7;border-radius:8px;padding:8px 10px;background:#faf8ff;}
.round-h{font-size:12px;font-weight:800;color:#7c3aed;}
.round-c{font-size:13px;margin-top:3px;white-space:pre-wrap;}
.round-c.empty,.round-sys{color:var(--muted);}
.round-sys{font-size:11px;margin-top:4px;font-family:ui-monospace,monospace;}
.rcomment{width:100%;min-height:64px;font-family:inherit;font-size:14px;padding:9px 11px;border:2px solid var(--border);border-radius:9px;resize:vertical;}
.rcomment:focus{border-color:var(--primary);outline:none;}
.rbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
/* Bulk select (Test & Review lane) */
.bulkbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;font-weight:800;color:var(--text);margin-bottom:4px;}
.bulkbtn{margin-bottom:4px;}
.card.sel{outline:2px solid var(--primary);outline-offset:1px;background:#eef0ff;}
/* Mobile lane switcher — hidden on desktop */
.lanenav{display:none;}
@media (max-width:768px){
  header{flex-direction:column;align-items:flex-start;gap:10px;}
  .wordmark{flex:none;}
  .hactions{width:100%;}
  .hactions .btn{flex:1 1 auto;text-align:center;}
  .lanenav{display:flex;flex-direction:column;gap:8px;padding:12px 14px 6px;}
  .lanenav-top{display:flex;align-items:center;gap:10px;}
  .lanenav-arrow{border:none;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12);border-radius:50%;width:34px;height:34px;font-size:16px;font-weight:800;color:var(--text);cursor:pointer;flex:0 0 auto;}
  .lanenav-arrow:active{transform:scale(.92);}
  .lanenav-name{flex:1;text-align:center;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--lc,#333);}
  .lanenav-count{background:var(--lc,#999);color:#fff;border-radius:10px;font-size:11px;font-weight:800;padding:1px 8px;}
  .lanenav-dots{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
  .lanenav-dots i{min-width:22px;height:22px;padding:0 6px;border-radius:11px;font-style:normal;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;background:#e7e9f1;color:var(--muted);cursor:pointer;transition:.15s;}
  .lanenav-dots i.empty{opacity:.5;}
  .lanenav-dots i.on{background:var(--dc,#667eea);color:#fff;opacity:1;transform:scale(1.08);}
  .board{display:block;overflow:visible;padding:0 12px 18px;}
  .lane{display:none;min-width:0;max-width:none;width:100%;box-shadow:none;}
  .lane.active{display:block;}
  .lane .lane-h{display:none;} /* lane name lives in the switcher on mobile */
  .lane-b{min-height:55vh;}
}
</style></head>
<body>
<header>
  <div class="wordmark">📋 cboard</div>
  <div class="hactions">
    <button class="btn btn-g" id="add-new">➕ New</button>
    <button class="btn btn-g" id="proj">🎯 Projects</button>
    <button class="btn btn-g" id="sum">📋 Log</button>
    <button class="btn btn-g" id="about">ℹ️ About</button>
  </div>
</header>
<div id="lanenav" class="lanenav"></div>
<div id="board" class="board"></div>
<div class="overlay hidden" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="promptov hidden" id="promptov"><div class="promptbox" id="promptbox"></div></div>
<div class="previewov hidden" id="previewov"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
let BOARD={lanes:[],cards:{}}, PROJECTS=[], open=null, poll=null, mLane=null, bulkLane=null;
const bulkSel=new Set();
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const api=(p,m,b)=>fetch(p,{method:m||'GET',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}).then(r=>r.json());
// Themed replacement for native prompt(). Resolves the entered string, or null if cancelled.
function askText(title,placeholder){
  return new Promise(resolve=>{
    const ov=document.getElementById('promptov'),box=document.getElementById('promptbox');
    box.innerHTML=`<div class="promptbox-h">${esc(title)}</div>
      <div class="promptbox-b"><input id="prompt-in" type="text" placeholder="${esc(placeholder||'')}" autocomplete="off"></div>
      <div class="promptbox-f"><button class="btn btn-g" id="prompt-cancel">Cancel</button><button class="btn btn-p" id="prompt-ok">OK</button></div>`;
    ov.classList.remove('hidden');
    const inp=document.getElementById('prompt-in');inp.focus();
    let done=false;
    const fin=v=>{if(done)return;done=true;ov.classList.add('hidden');document.removeEventListener('keydown',onKey);resolve(v);};
    const onKey=e=>{if(e.key==='Enter')fin(inp.value);else if(e.key==='Escape')fin(null);};
    document.addEventListener('keydown',onKey);
    document.getElementById('prompt-ok').onclick=()=>fin(inp.value);
    document.getElementById('prompt-cancel').onclick=()=>fin(null);
    ov.onclick=e=>{if(e.target===ov)fin(null);};
  });
}
// Themed yes/no confirm. Resolves true if confirmed.
function confirmBox(title,body,okLabel){
  return new Promise(resolve=>{
    const ov=document.getElementById('promptov'),box=document.getElementById('promptbox');
    box.innerHTML=`<div class="promptbox-h">${esc(title)}</div>
      <div class="promptbox-b" style="font-size:14px;color:var(--muted)">${esc(body||'')}</div>
      <div class="promptbox-f"><button class="btn btn-g" id="c-cancel">Cancel</button><button class="btn btn-danger" id="c-ok">${esc(okLabel||'Delete')}</button></div>`;
    ov.classList.remove('hidden');
    let done=false;const fin=v=>{if(done)return;done=true;ov.classList.add('hidden');document.removeEventListener('keydown',onKey);resolve(v);};
    const onKey=e=>{if(e.key==='Escape')fin(false);};
    document.addEventListener('keydown',onKey);
    document.getElementById('c-ok').onclick=()=>fin(true);
    document.getElementById('c-cancel').onclick=()=>fin(false);
    ov.onclick=e=>{if(e.target===ov)fin(false);};
  });
}
function fmtSize(n){if(!n)return '';if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(0)+' KB';return (n/1048576).toFixed(1)+' MB';}
const PREVIEWABLE=/\.(png|jpe?g|gif|webp|svg|bmp|avif|pdf|html?|txt|md|json|csv)$/i;
// Lightbox preview for an attachment. Images & pdf/html render inline; others fall back to a new tab.
function previewFile(path,name){
  const ov=document.getElementById('previewov');const url='/files/'+path.split('/').map(encodeURIComponent).join('/');
  const isImg=/\.(png|jpe?g|gif|webp|svg|bmp|avif)$/i.test(name);
  const isDoc=/\.(pdf|html?|txt|md|json|csv)$/i.test(name);
  if(!isImg&&!isDoc){window.open(url,'_blank');return;}
  const inner=isImg?`<img src="${url}">`:`<iframe src="${url}"></iframe>`;
  ov.innerHTML=`<div class="previewbar"><span>${esc(name)}</span><a href="${url}" target="_blank">Open ↗</a><button class="pclose" id="pv-x">×</button></div>${inner}`;
  ov.classList.remove('hidden');
  const cl=()=>{ov.classList.add('hidden');ov.innerHTML='';document.removeEventListener('keydown',onK);};
  const onK=e=>{if(e.key==='Escape')cl();};document.addEventListener('keydown',onK);
  document.getElementById('pv-x').onclick=cl;
  ov.onclick=e=>{if(e.target===ov)cl();};
}
function lcolor(l){return l.color||'#667eea';}
function statusTag(s,lane){
  if(!s||s==='todo')return '';
  // hide when the status just echoes the lane it's in (done-in-done, blocked-in-blocked)
  if(lane&&(s===lane||(s==='done'&&lane==='done')||(s==='blocked'&&lane==='blocked')))return '';
  return `<span class="st st-${esc(s)}">${esc(s)}</span>`;
}
function targetTag(c){if(c.repo){const r=String(c.repo).replace(/\/+$/,'').split('/').pop()||c.repo;return `<span class="tag tag-repo">🔗 ${esc(r)}${c.branch?'@'+esc(c.branch):''}</span>`;}return '<span class="tag tag-art">📦 artifact</span>';}

function load(){return Promise.all([api('/api/board'),api('/api/projects')]).then(([b,p])=>{BOARD=b;PROJECTS=Array.isArray(p)?p:[];render();if(open)reopen();});}
function projTitle(p){const m=(p.goal||'').match(/^#\s*(.+)$/m);return m?m[1].trim():p.id;}
function projectSelect(node,ctx){
  // hide done projects from the picker, but keep the one already assigned to this card
  const list=PROJECTS.filter(p=>!p.done||p.id===node.project);
  const opts=['<option value="">— no project —</option>'].concat(list.map(p=>`<option value="${esc(p.id)}" ${node.project===p.id?'selected':''}>${esc(projTitle(p))}${p.done?' (done)':''}</option>`)).join('');
  return `<div style="margin-bottom:12px"><select class="msel" id="psel" data-pl="${esc(ctx.lane)}" data-pi="${esc(ctx.id)}" data-pt="${esc(ctx.ticketId||'')}">${opts}</select></div>`;
}
function wireProject(){const ps=document.getElementById('psel');if(!ps)return;
  ps.onchange=()=>api('/api/setproject','POST',{lane:ps.dataset.pl,id:ps.dataset.pi,ticketId:ps.dataset.pt||undefined,project:ps.value}).then(load);}

function render(){
  const el=document.getElementById('board');
  el.innerHTML=BOARD.lanes.map(l=>{
    const cs=BOARD.cards[l.id]||[];
    const bar=bulkBar(l.id,cs);
    const plus=l.id==='planning'?`<button class="btn btn-g bulkbtn" data-newlane="1" style="width:100%">➕ New card</button>`:'';
    return `<div class="lane"><div class="lane-h" style="--lc:${lcolor(l)}">
      <span class="lane-n">${esc(l.name)}</span><span class="lane-c">${cs.length}</span></div>
      <div class="lane-b" data-lane="${esc(l.id)}">${bar}${plus}${cs.map(c=>cardHtml(c,l.id)).join('')||'<div class="empty" style="padding:6px">—</div>'}</div></div>`;
  }).join('');
  el.querySelectorAll('[data-newlane]').forEach(b=>b.onclick=e=>{e.stopPropagation();openCreateChooser();});
  el.querySelectorAll('.card').forEach(x=>{
    const lane=x.dataset.lane,id=x.dataset.id;
    if(lane===bulkLane){
      x.setAttribute('draggable','false');
      if(bulkSel.has(id))x.classList.add('sel');
      x.onclick=()=>{bulkSel.has(id)?bulkSel.delete(id):bulkSel.add(id);render();};
    }else x.onclick=()=>{if(!dragId)openCard(lane,id);};
  });
  wireDnD();
  wireBulk();
  renderLaneNav();
  applyMobileLane();
  initBoardSwipe();
}
function bulkBar(laneId,cs){
  if(bulkLane!==laneId)return cs.length?`<button class="btn btn-g bulkbtn" data-bulk="start" data-bl="${esc(laneId)}">☑ Select</button>`:'';
  const moveDone=laneId==='review'?`<button class="btn btn-p" data-bulk="done">Done →</button>`:'';
  return `<div class="bulkbar"><span>${bulkSel.size} selected</span>
    <button class="btn btn-g" data-bulk="all">All</button>
    ${moveDone}
    <button class="btn btn-g" data-bulk="archive">📥 Archive</button>
    <button class="btn btn-danger" data-bulk="delete">🗑 Delete</button>
    <button class="btn btn-g" data-bulk="cancel">✕</button></div>`;
}
function wireBulk(){
  document.querySelectorAll('#board [data-bulk]').forEach(b=>b.onclick=async e=>{e.stopPropagation();const a=b.dataset.bulk;
    if(a==='start'){bulkLane=b.dataset.bl;bulkSel.clear();render();return;}
    if(a==='cancel'){bulkLane=null;bulkSel.clear();render();return;}
    if(a==='all'){const cs=BOARD.cards[bulkLane]||[];const all=cs.length&&cs.every(c=>bulkSel.has(c.id));cs.forEach(c=>all?bulkSel.delete(c.id):bulkSel.add(c.id));render();return;}
    const ids=[...bulkSel];if(!ids.length){bulkLane=null;render();return;}
    if(a==='done'){await api('/api/bulkmove','POST',{from:bulkLane,to:'done',ids});}
    else if(a==='archive'){if(!await confirmBox(`Archive ${ids.length} card(s)?`,'They’ll be hidden from the board but kept in the board’s archive/ folder.','Archive'))return;await api('/api/bulkarchive','POST',{lane:bulkLane,ids});}
    else if(a==='delete'){if(!await confirmBox(`Delete ${ids.length} card(s)?`,'This permanently removes them and their files from disk. This cannot be undone.','Delete forever'))return;await api('/api/bulkdelete','POST',{lane:bulkLane,ids});}
    bulkLane=null;bulkSel.clear();load();
  });
}
let dragId=null, dragFrom=null;
function wireDnD(){
  document.querySelectorAll('#board .card').forEach(c=>{
    c.ondragstart=e=>{dragId=c.dataset.id;dragFrom=c.dataset.lane;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragId);};
    c.ondragend=()=>{c.classList.remove('dragging');dragId=null;dragFrom=null;document.querySelectorAll('.lane-b.dragover').forEach(z=>z.classList.remove('dragover'));};
  });
  document.querySelectorAll('#board .lane-b').forEach(z=>{
    z.ondragover=e=>{if(dragId&&z.dataset.lane!==dragFrom){e.preventDefault();e.dataTransfer.dropEffect='move';z.classList.add('dragover');}};
    z.ondragleave=()=>z.classList.remove('dragover');

let boardSwipeInit=false;
function initBoardSwipe(){
  if(boardSwipeInit)return;const el=document.getElementById('board');if(!el)return;boardSwipeInit=true;
  let sx=0,sy=0,axis=null;
  el.addEventListener('touchstart',e=>{if(window.innerWidth>768||e.touches.length>1){axis='off';return;}sx=e.touches[0].clientX;sy=e.touches[0].clientY;axis=null;},{passive:true});
  el.addEventListener('touchmove',e=>{if(axis==='off'||axis==='v')return;const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(!axis&&(Math.abs(dx)>6||Math.abs(dy)>6))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';},{passive:true});
  el.addEventListener('touchend',e=>{if(axis!=='h')return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>55)setMobileLane(activeLaneIdx()+(dx<0?1:-1));axis=null;},{passive:true});
}

function fileIcon(a){

  if(['json','csv','xml','yml','yaml'].includes(e))return '🗂';
  if(['zip','tar','gz','rar','7z'].includes(e))return '🗜';
  if(['html','htm'].includes(e))return '🌐';

}
function moveBar(lane,id){
  return `<div class="movebar"><select class="msel" id="msel"><option value="">⇄ Move to lane…</option>`+
    BOARD.lanes.filter(l=>l.id!==lane).map(l=>`<option value="${esc(l.id)}">${esc(l.name)}</option>`).join('')+
    `</select></div>`;
}

// One modal to create a card: title at the top, description below. On Create it makes the
// card and drops you straight on its view, so you can keep editing / attach / move it.
// opts: {type:'ticket'|'epic', project?, epic?, epicLane?}. With epic set, creates a
// sub-ticket of that epic and returns to the epic view; otherwise a top-level card in planning.
function openNewCard(opts){
  opts=opts||{}; const type=opts.epic?'ticket':(opts.type||'ticket');
  open={kind:'new',opts};
  const where=opts.epic?'ticket in epic':(type==='epic'?'epic':'ticket');
  const cap=(type==='epic'?'Epic':'Ticket');
  showSheet(`<div class="sheet-h"><div class="sheet-t">${type==='epic'?'🗂':'📋'} New ${where}</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    <input id="nt-title" class="msel" type="text" placeholder="${cap} title" autocomplete="off" style="margin-bottom:14px">
    <div class="label">Description</div>
    <textarea id="nt-body" placeholder="What needs doing? Markdown welcome — optional."></textarea>
    <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-p" id="nt-go">Create ${type==='epic'?'epic':'ticket'}</button><button class="btn btn-g" id="nt-cancel">Cancel</button></div>
   </div>`);
  const ti=document.getElementById('nt-title');ti.focus();
  document.getElementById('nt-cancel').onclick=close;
  const submit=()=>{const title=ti.value.trim();if(!title){ti.focus();return;}
    const body=document.getElementById('nt-body').value;
    if(opts.epic){
      api('/api/create','POST',{type:'ticket',title,epic:opts.epic,body}).then(()=>{open=null;load().then(()=>openEpic(opts.epicLane,opts.epic));});
      return;
    }
    api('/api/create','POST',{type,title,project:opts.project||undefined}).then(r=>{
      const id=r.id;
      const go=()=>{open=null;load().then(()=>type==='epic'?openEpic('planning',id):openCard('planning',id));};
      body.trim()?api('/api/save','POST',{lane:'planning',id,body}).then(go):go();
    });};
  document.getElementById('nt-go').onclick=submit;
  ti.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();submit();}};
}

// The "what do you want to start?" chooser, with help text for each kind.
function openCreateChooser(project){
  open={kind:'chooser',cproject:project||''};
  const opt=(emoji,name,t,help)=>`<div class="trow" data-new="${t}" style="flex-direction:column;align-items:flex-start;gap:3px;padding:12px 14px">
    <div class="tt">${emoji} ${name}</div><div style="font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.4">${help}</div></div>`;
  showSheet(`<div class="sheet-h"><div class="sheet-t">➕ What do you want to start?</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    ${opt('📋','Ticket','ticket','A single commit of work that can be tested and reviewed on its own.')}
    ${opt('🗂','Epic','epic','A group of tickets worked one after another, then tested together — like a feature branch.')}
    ${opt('🎯','Project','project','A group of epics that share some context. You can add the epics later.')}
   </div>`);
  document.querySelectorAll('#sheet [data-new]').forEach(r=>r.onclick=()=>{const t=r.dataset.new;
    if(t==='project')openNewProject(); else openNewCard({type:t,project:project});});
}

function openNewProject(){
  open={kind:'newproj'};
  showSheet(`<div class="sheet-h"><div class="sheet-t">🎯 New project</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    <input id="np-title" class="msel" type="text" placeholder="Project name" autocomplete="off" style="margin-bottom:14px">
    <div class="label">Goal / what it's for</div>
    <textarea id="np-body" placeholder="The shared goal and context for its epics — optional, add later."></textarea>
    <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-p" id="np-go">Create project</button><button class="btn btn-g" id="np-cancel">Cancel</button></div>
   </div>`);
  const ti=document.getElementById('np-title');ti.focus();
  document.getElementById('np-cancel').onclick=close;
  const submit=()=>{const name=ti.value.trim();if(!name){ti.focus();return;}
    const body=document.getElementById('np-body').value;
    api('/api/project/create','POST',{name}).then(r=>{const id=r.id;
      const go=()=>{open=null;load().then(()=>openProject(id));};
      body.trim()?api('/api/project/save','POST',{id,body}).then(go):go();});};
  document.getElementById('np-go').onclick=submit;
  ti.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();submit();}};
}

function openCard(lane,id){
  const c=find(lane,id);if(!c)return;
  if(c.type==='epic')return openEpic(lane,id);
  open={lane,id};
  const ln=BOARD.lanes.find(l=>l.id===lane);
  showSheet(`<div class="sheet-h"><div class="sheet-t">${esc(c.title)}</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    <div class="meta"><span class="tag" style="background:${lcolor(ln)};color:#fff">${esc(ln.name)}</span>${targetTag(c)}${statusTag(c.status,lane)}${c.paused?'<span class="tag tag-pause">⏸ paused</span>':''}</div>
    ${moveBar(lane,id)}
    ${projectSelect(c,{lane,id})}
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><button class="btn btn-g" id="edit">✏️ Edit</button>${uploadCtrl()}<button class="btn btn-g" id="arch">📥 Archive</button><button class="btn btn-danger" id="del">🗑 Delete</button></div>
    <div class="md" id="md"></div>${artHtml(c)}${assetHtml(c)}
    ${reviewSection(c,{lane,id})}
    <div class="label">Activity log</div><div id="log"></div>
   </div>`);
  document.getElementById('md').innerHTML=c.content?renderMd(c):'<span class="empty">No description.</span>';
  fillLog(c.log);
  wireActions({lane,id});
  wireUpload({lane,id});
  wireProject();
  wireAssets();
  wireReview({lane,id});
  document.getElementById('edit').onclick=()=>editInline({lane,id},c.title,c.content,()=>openCard(lane,id));
  document.getElementById('arch').onclick=()=>confirmBox('Archive ticket?','“'+(c.title||id)+'” will be hidden from the board but kept in the board’s archive/ folder.','Archive').then(ok=>{if(ok)api('/api/archive','POST',{lane,id}).then(()=>{close();load();});});
  document.getElementById('del').onclick=()=>confirmBox('Delete ticket?','“'+(c.title||id)+'” and its files will be permanently removed from disk. This cannot be undone.','Delete forever').then(ok=>{if(ok)api('/api/delete','POST',{lane,id}).then(()=>{close();load();});});
}
function openEpic(lane,id){
  const c=find(lane,id);if(!c)return;open={lane,id,kind:'epic'};
  const ln=BOARD.lanes.find(l=>l.id===lane);const p=c.progress||{done:0,total:0};const pct=p.total?Math.round(p.done/p.total*100):0;
  showSheet(`<div class="sheet-h"><div class="sheet-t">🗂 ${esc(c.title)}</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    <div class="meta"><span class="tag" style="background:${lcolor(ln)};color:#fff">${esc(ln.name)}</span>${targetTag(c)}${c.paused?'<span class="tag tag-pause">⏸ paused</span>':''}</div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div><div class="ptext" style="margin-bottom:12px">${p.done}/${p.total} tickets · ${c.parallel?'parallel':'sequential'}</div>
    ${moveBar(lane,id)}
    ${projectSelect(c,{lane,id})}
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><button class="btn btn-g" id="edit">✏️ Edit</button><button class="btn btn-g" id="pause">${c.paused?'▶ Unpause':'⏸ Pause'}</button>${uploadCtrl()}<button class="btn btn-g" id="arch">📥 Archive</button><button class="btn btn-danger" id="del">🗑 Delete</button></div>
    <div class="md" id="md"></div>${epicProductHtml(c)}${assetHtml(c)}
    <div class="label">Shared docs</div>${docsHtml(c)}
    <div style="margin-top:8px"><button class="btn btn-g" id="adddoc">+ Doc</button></div>
    <div class="label">Tickets (${p.total})</div>
    ${(c.tickets||[]).map(t=>`<div class="trow" data-t="${esc(t.id)}"><span class="tt">${esc(t.title)}</span>${t.paused?'<span class="tag tag-pause">⏸</span>':''}<span class="st st-${esc(t.status)}">${esc(t.status)}</span></div>`).join('')||'<div class="empty">No tickets yet — an epic is a sequence of tickets. Add the first one. →</div>'}
    <div style="margin-top:8px"><button class="btn btn-p" id="addticket">+ Ticket</button></div>
    ${reviewSection(c,{lane,id})}
    <div class="label">Epic log</div><div id="log"></div>
   </div>`);
  document.getElementById('md').innerHTML=c.content?renderMd(c):'<span class="empty">No description.</span>';
  fillLog(c.log);
  wireActions({lane,id});
  wireUpload({lane,id});
  wireProject();
  wireAssets();
  wireReview({lane,id});
  document.getElementById('edit').onclick=()=>editInline({lane,id},c.title,c.content,()=>openEpic(lane,id));
  document.getElementById('arch').onclick=()=>confirmBox('Archive epic?','“'+(c.title||id)+'” and its '+p.total+' ticket(s) will be hidden from the board but kept in the board’s archive/ folder.','Archive').then(ok=>{if(ok)api('/api/archive','POST',{lane,id}).then(()=>{close();load();});});
  document.getElementById('del').onclick=()=>confirmBox('Delete epic?','“'+(c.title||id)+'” and its '+p.total+' ticket(s) will be permanently removed from disk. This cannot be undone.','Delete forever').then(ok=>{if(ok)api('/api/delete','POST',{lane,id}).then(()=>{close();load();});});
  document.querySelectorAll('[data-t]').forEach(r=>r.onclick=()=>openTicket(lane,id,r.dataset.t));
  document.getElementById('addticket').onclick=()=>openNewCard({type:'ticket',epic:id,epicLane:lane});
  document.querySelectorAll('[data-doc]').forEach(r=>r.onclick=()=>openDoc(lane,id,r.dataset.doc));
  document.getElementById('adddoc').onclick=()=>askText('New shared doc','Doc name (e.g. spec)').then(n=>{
    if(n&&n.trim())api('/api/adddoc','POST',{lane,id,name:n.trim()}).then(()=>load());});
}
function docsHtml(n){
  if(!n.docs||!n.docs.length)return '<div class="empty">No shared docs yet — “+ Doc” to add info shared by all tickets.</div>';
  return n.docs.map(d=>`<div class="trow" data-doc="${esc(d.name)}"><span class="tt">📄 ${esc(d.name)}</span>`+
    (d.content!=null?'<span class="st st-todo">edit</span>':`<a href="/files/${encodeURI(d.path)}" target="_blank">Open ↗</a>`)+`</div>`).join('');
}
function openDoc(lane,id,name){
  const c=find(lane,id);const d=(c.docs||[]).find(x=>x.name===name);if(!d)return;open={lane,id,doc:name};
  if(d.content==null){window.open('/files/'+encodeURI(d.path),'_blank');return;}
  showSheet(`<div class="sheet-h"><button class="x" id="back">←</button><div class="sheet-t">📄 ${esc(name)}</div><button class="x" data-x>×</button></div>
   <div class="sheet-b"><div style="margin-bottom:12px"><button class="btn btn-g" id="edit">✏️ Edit</button></div><div class="md" id="md"></div></div>`);
  document.getElementById('md').innerHTML=d.content?marked.parse(d.content):'<span class="empty">Empty doc.</span>';
  document.getElementById('back').onclick=()=>openEpic(lane,id);
  document.getElementById('edit').onclick=()=>{
    const b=document.querySelector('.sheet-b');
    b.innerHTML=`<textarea id="ta">${esc(d.content||'')}</textarea><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-p" id="save">💾 Save</button><button class="btn btn-g" id="cancel">Cancel</button></div>`;
    document.getElementById('cancel').onclick=()=>openDoc(lane,id,name);
    document.getElementById('save').onclick=()=>api('/api/save','POST',{lane,id,docfile:name,body:document.getElementById('ta').value}).then(load).then(()=>openDoc(lane,id,name));
  };
}
function openTicket(lane,id,tid){
  const c=find(lane,id);const t=(c.tickets||[]).find(x=>x.id===tid);if(!t)return;open={lane,id,t:tid};
  showSheet(`<div class="sheet-h"><button class="x" id="back">←</button><div class="sheet-t">${esc(t.title)}</div><button class="x" data-x>×</button></div>
   <div class="sheet-b">
    <div class="meta">${targetTag(t)}${statusTag(t.status)}${t.paused?'<span class="tag tag-pause">⏸ paused</span>':''}</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><button class="btn btn-g" id="edit">✏️ Edit</button>${uploadCtrl()}<button class="btn btn-g" id="arch">📥 Archive</button><button class="btn btn-danger" id="del">🗑 Delete</button></div>
    <div class="md" id="md"></div>${artHtml(t)}${assetHtml(t)}
    ${reviewSection(t,{lane,id,ticketId:tid})}
    <div class="label">Activity log</div><div id="log"></div>
   </div>`);
  document.getElementById('md').innerHTML=t.content?renderMd(t):'<span class="empty">No description.</span>';
  fillLog(t.log);
  wireUpload({lane,id,ticketId:tid});
  wireAssets();
  wireReview({lane,id,ticketId:tid});
  document.getElementById('back').onclick=()=>openEpic(lane,id);
  document.getElementById('edit').onclick=()=>editInline({lane,id,ticketId:tid},t.title,t.content,()=>openTicket(lane,id,tid));
  document.getElementById('arch').onclick=()=>confirmBox('Archive ticket?','“'+(t.title||tid)+'” will be hidden from the board but kept in the board’s archive/ folder.','Archive').then(ok=>{if(ok)api('/api/archive','POST',{lane,id,ticketId:tid}).then(()=>load()).then(()=>openEpic(lane,id));});
  document.getElementById('del').onclick=()=>confirmBox('Delete ticket?','“'+(t.title||tid)+'” and its files will be permanently removed from disk. This cannot be undone.','Delete forever').then(ok=>{if(ok)api('/api/delete','POST',{lane,id,ticketId:tid}).then(()=>load()).then(()=>openEpic(lane,id));});
}
function wireActions(ctx){
  const ms=document.getElementById('msel');
  if(ms)ms.onchange=()=>{if(ms.value){const to=ms.value;api('/api/move','POST',{id:ctx.id,from:ctx.lane,to}).then(()=>{open={lane:to,id:ctx.id};load();});}};
  const pz=document.getElementById('pause');if(pz)pz.onclick=()=>api('/api/pause','POST',{lane:ctx.lane,id:ctx.id}).then(load);
}
function fillLog(text){
  document.getElementById('log').innerHTML=text&&text.trim()?`<div class="logbox">${esc(text.trim())}</div>`:'<div class="empty">No activity yet.</div>';}
// Edit a card in place: swap just the description region for a title box + body box, leaving
// the rest of the card (move, project, attachments, log) visible — no separate stripped view.
function editInline(ctx,title,content,after){
  const md=document.getElementById('md');if(!md)return;
  md.innerHTML=`<input id="ed-title" class="msel" value="${esc(title||'')}" placeholder="Title" style="margin-bottom:10px">
    <textarea id="ed-body" style="min-height:180px">${esc(content||'')}</textarea>
    <div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-p" id="ed-save">💾 Save</button><button class="btn btn-g" id="ed-cancel">Cancel</button></div>`;
  document.getElementById('ed-cancel').onclick=after;
  document.getElementById('ed-save').onclick=()=>{
    const t=document.getElementById('ed-title').value.trim();
    api('/api/save','POST',{...ctx,title:t||undefined,body:document.getElementById('ed-body').value}).then(load).then(after);
  };
}
// editBody: in-place editor for single-content docs/goals (no title) — replaces the body region.
function editBody(ctx,content,after){
  const b=document.getElementById('sheet').querySelector('.sheet-b');
  b.innerHTML=`<textarea id="ta">${esc(content||'')}</textarea>
   <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-p" id="save">💾 Save</button><button class="btn btn-g" id="cancel">Cancel</button></div>`;
  document.getElementById('cancel').onclick=after;
  document.getElementById('save').onclick=()=>api('/api/save','POST',{...ctx,body:document.getElementById('ta').value}).then(load).then(after);
}
document.getElementById('sum').onclick=openLog;
document.getElementById('about').onclick=openAbout;
document.getElementById('proj').onclick=openProjects;
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')close();};
document.getElementById('add-new').onclick=()=>openCreateChooser();
load();poll=setInterval(()=>{if(!dragId&&!bulkLane&&document.getElementById('ov').classList.contains('hidden'))load();},4000);
</script>
</body></html>
