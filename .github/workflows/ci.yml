name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      # Syntax-check the dashboard's inline JS (caught before it can ship in the binary).
      - name: Check dashboard JS
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 - <<'PY'
          import re
          js = re.findall(r'<script>(.*?)</script>', open('web/index.html').read(), re.S)[-1]
          open('app.js', 'w').write(js)
          PY
          node --check app.js && rm app.js

  # Drives the real dashboard in a headless browser through the full lifecycle
  # (create modal, move, inline edit, blocked-result panel, archive, delete, context).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build -o cboard .
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install e2e deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        working-directory: e2e
        run: npx playwright test
