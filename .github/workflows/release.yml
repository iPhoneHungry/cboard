name: release

# Tag a commit `vX.Y.Z` and push the tag to build per-OS binaries and attach them
# to a GitHub Release. Users then download the one for their OS — no Go needed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false  # no go.sum (zero external deps) — skip the cache restore warning
      - name: Cross-compile
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${t%/*}; arch=${t#*/}; ext=""
            [ "$os" = windows ] && ext=".exe"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags "-s -w" -o "dist/cboard-$os-$arch$ext" .
          done
          (cd dist && for f in *; do sha256sum "$f" >> checksums.txt; done)
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
